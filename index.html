<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LæreHjelp</title>
<style>
body{margin:0;font-family:Arial;background:#f5f7fb}
section{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column;text-align:center}
section.active{display:flex}
button{padding:12px 20px;font-size:16px;border:none;border-radius:10px;cursor:pointer;background:#2b59ff;color:white}

/* Startside */
#start{background:url('https://picsum.photos/1600/900') center/cover no-repeat;color:white}
#start h1{font-size:48px;margin-bottom:20px;text-shadow:0 2px 10px rgba(0,0,0,0.5)}

/* Trinnvalg */
#level button{margin:5px}

/* Hovedside */
nav{display:flex;gap:10px;justify-content:center;background:#1e3fd1;padding:10px}
nav button{background:white;color:black}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1);margin:10px}
#chatBox{height:200px;overflow:auto;border:1px solid #ddd;padding:10px;border-radius:10px;margin-bottom:10px}
</style>
</head>
<body>

<!-- STARTSIDE -->
<section id="start" class="active">
<h1>Velkommen til LæreHjelp</h1>
<button onclick="goToLevel()">Start</button>
</section>

<!-- VELG TRINN -->
<section id="level">
<h2>Velg trinn</h2>
<div id="levels"></div>
</section>

<!-- HOVEDSIDE -->
<section id="main">
<nav>
<button onclick="showTab('chat')">AI Chat</button>
<button onclick="showTab('quiz')">Quiz</button>
<button onclick="showTab('pugging')">Pugging</button>
</nav>

<div id="chat" class="card">
<h3>AI LæreChat</h3>
<div id="chatBox"></div>
<input id="chatInput" placeholder="Still et spørsmål...">
<button onclick="sendMessage()">Send</button>
</div>

<div id="quiz" class="card" style="display:none">
<h3>Quiz</h3>
<p id="question"></p>
<div id="options"></div>
<p id="result"></p>
</div>

<div id="pugging" class="card" style="display:none">
<h3>Puggehjelp</h3>
<input id="studyInput" placeholder="Skriv noe...">
<button onclick="addCard()">Legg til</button>
<div id="cards"></div>
</div>
</section>

<script>
function goToLevel(){
 document.getElementById('start').classList.remove('active');
 document.getElementById('level').classList.add('active');
}

const levels=["3. klasse","4. klasse","5. klasse","6. klasse","7. klasse","8. klasse","9. klasse","10. klasse","VG1","VG2","VG3"];

levels.forEach(l=>{
 let btn=document.createElement('button');
 btn.textContent=l;
 btn.onclick=()=>goToMain();
 document.getElementById('levels').appendChild(btn);
});

function goToMain(){
 document.getElementById('level').classList.remove('active');
 document.getElementById('main').classList.add('active');
}

function showTab(tab){
 document.querySelectorAll('#main .card').forEach(c=>c.style.display='none');
 document.getElementById(tab).style.display='block';
}

function sendMessage(){
 let input=document.getElementById('chatInput');
 let box=document.getElementById('chatBox');
 let msg=input.value;
 if(!msg) return;
 box.innerHTML+=`<div>Du: ${msg}</div>`;
 box.innerHTML+=`<div style='color:blue'>AI: Tenk steg for steg. Hva vet du allerede?</div>`;
 input.value="";
 box.scrollTop=box.scrollHeight;
}

const quiz=[
{q:"Hva er 2+2?",a:["3","4","5"],c:1},
{q:"Hva er hovedstaden i Norge?",a:["Oslo","Bergen","Trondheim"],c:0}
];
let i=0;

function loadQuiz(){
 let q=quiz[i];
 document.getElementById('question').textContent=q.q;
 let opt=document.getElementById('options');
 opt.innerHTML="";
 q.a.forEach((o,index)=>{
 let b=document.createElement('button');
 b.textContent=o;
 b.onclick=()=>answer(index);
 opt.appendChild(b);
 });
}

function answer(x){
 let q=quiz[i];
 document.getElementById('result').textContent = x===q.c ? "Riktig!" : "Prøv igjen!";
 i=(i+1)%quiz.length;
 setTimeout(loadQuiz,1000);
}
loadQuiz();

function addCard(){
 let text=document.getElementById('studyInput').value;
 if(!text) return;
 let div=document.createElement('div');
 div.className='card';
 div.textContent=text;
 document.getElementById('cards').appendChild(div);
 document.getElementById('studyInput').value="";
}
</script>

</body>
</html>
