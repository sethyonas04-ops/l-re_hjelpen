<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lærehjelp Pro - Smart AI</title>
    <style>
        :root {
            --primary: #4a90e2;
            --ai-bg: #f1f3f4;
            --user-bg: #007bff;
            --accent: #f39c12;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8f9fa; }
        .hidden { display: none !important; }
        
        /* Layout */
        section { padding: 30px 15px; max-width: 800px; margin: 0 auto; text-align: center; height: 100vh; display: flex; flex-direction: column; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 10px 0; cursor: pointer; }
        
        /* Chat Design */
        #chat-box { flex: 1; background: white; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #ffffff; }
        
        .msg { padding: 14px 18px; border-radius: 18px; max-width: 80%; line-height: 1.5; text-align: left; font-size: 1rem; }
        .ai { background: var(--ai-bg); align-self: flex-start; color: #202124; border-bottom-left-radius: 4px; }
        .user { background: var(--user-bg); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .control-q { border-left: 4px solid var(--accent); background: #fff8e1; padding: 10px; margin-top: 10px; font-style: italic; border-radius: 5px; }

        .input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 30px; outline: none; font-size: 1rem; }
        .btn-send { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        /* Trinn-knapper */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; }
        .btn-opt { padding: 15px; border: 2px solid var(--primary); border-radius: 12px; background: white; cursor: pointer; font-weight: bold; }
        .btn-opt:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <section id="landing">
        <h1 style="font-size: 3rem; margin-top: 50px;">Lærehjelp</h1>
        <p>Din personlige AI-lærer</p>
        <div style="flex:1; display:flex; align-items:center; justify-content:center;">
            <div style="width:200px; height:200px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:5rem;">🎓</div>
        </div>
        <button class="btn-send" style="padding: 20px 80px; font-size: 1.5rem;" onclick="show('grade-select')">Start</button>
    </section>

    <section id="grade-select" class="hidden">
        <h2>Hvilket trinn går du på?</h2>
        <div class="grid" id="gradeGrid"></div>
    </section>

    <section id="dashboard" class="hidden">
        <h2 id="userHeader">Lærehjelp</h2>
        <div class="card" onclick="show('chat-section')"><h3>🤖 AI Lærepartner</h3><p>Forklarer alt og stiller kontrollspørsmål.</p></div>
        <div class="card" onclick="alert('Quiz-modul er klar!')"><h3>📝 Quiz</h3><p>Test kunnskapen din.</p></div>
        <div class="card" onclick="alert('Glose-modul er klar!')"><h3>🔤 Gloseprøve</h3><p>Øv på gloser.</p></div>
        <button onclick="show('grade-select')" style="background:none; border:none; color:gray; cursor:pointer;">← Bytt trinn</button>
    </section>

    <section id="chat-section" class="hidden">
        <div id="chat-box">
            <div id="messages">
                <div class="msg ai">Hei! Jeg er klar til å hjelpe deg. Spør meg om hva som helst fra skolefagene dine!</div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Spør om f.eks. 'fotosyntese' eller 'matte'...">
                <button class="btn-send" onclick="handleInput()">Send</button>
            </div>
        </div>
        <button onclick="show('dashboard')" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-top:10px;">← Tilbake</button>
    </section>

    <script>
        let currentGrade = "";
        let isWaitingForAnswer = false;
        let expectedAnswer = "";

        function show(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // Generer trinn
        const grades = ["3. klasse", "4. klasse", "5. klasse", "6. klasse", "7. klasse", "8. klasse", "9. klasse", "10. klasse", "VG1", "VG2", "VG3"];
        grades.forEach(g => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = g;
            b.onclick = () => { currentGrade = g; document.getElementById('userHeader').innerText = "Lærehjelp for " + g; show('dashboard'); };
            document.getElementById('gradeGrid').appendChild(b);
        });

        // --- SMART AI LOGIKK ---
        const brain = [
            {
                keywords: ["pi", "omkrets", "sirkel", "3.14"],
                explain: "Pi (π) er et magisk tall i matematikken! Det forteller oss forholdet mellom omkretsen og diameteren til en sirkel. Uansett hvor stor sirkelen er, er omkretsen alltid ca. 3,14 ganger lenger enn tvers over.",
                question: "Hvor mange ganger lenger enn diameteren er omkretsen ca.?",
                answer: "3"
            },
            {
                keywords: ["fotosyntese", "planter", "sollys", "oksygen"],
                explain: "Fotosyntese er plantenes måte å lage energi på. De bruker sollys, vann og CO2 for å lage sukker (mat) og oksygen (som vi puster).",
                question: "Hva heter gassen som plantene lager og som vi mennesker trenger for å puste?",
                answer: "oksygen"
            },
            {
                keywords: ["verdenskrig", "krigen", "1914", "tyskland"],
                explain: "Første verdenskrig var en stor konflikt som endret hele verden. Den startet i 1914 og varte til 1918. Mange land i Europa kjempet mot hverandre i skyttergraver.",
                question: "I hvilket årstall startet den første verdenskrigen?",
                answer: "1914"
            }
        ];

        function handleInput() {
            const inp = document.getElementById('userInput');
            const val = inp.value.trim();
            if(!val) return;

            addMsg(val, 'user');
            inp.value = "";

            setTimeout(() => {
                // Hvis vi venter på svar på et kontrollspørsmål
                if(isWaitingForAnswer) {
                    if(val.toLowerCase().includes(expectedAnswer)) {
                        addMsg("Helt riktig! Utrolig bra. Hva mer vil du lære om nå?", "ai");
                        isWaitingForAnswer = false;
                    } else {
                        addMsg("Ikke helt, men du er nær! Tenk over det jeg forklarte i sted og prøv å svar på nytt.", "ai");
                    }
                    return;
                }

                // Finn beste match basert på nøkkelord
                let found = brain.find(item => item.keywords.some(k => val.toLowerCase().includes(k)));

                if(found) {
                    addMsg(found.explain, "ai");
                    setTimeout(() => {
                        addMsg("💡 Kontrollspørsmål: " + found.question, "ai");
                        isWaitingForAnswer = true;
                        expectedAnswer = found.answer;
                    }, 1000);
                } else {
                    addMsg("Det høres spennende ut! Kan du fortelle meg litt mer om hva du tenker på, så skal jeg forklare det så godt jeg kan?", "ai");
                }
            }, 700);
        }

        function addMsg(txt, side) {
            const m = document.createElement('div');
            m.className = `msg ${side}`;
            m.innerText = txt;
            document.getElementById('messages').appendChild(m);
            const box = document.getElementById('messages');
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleInput() });
    </script>
</body>
</html>
